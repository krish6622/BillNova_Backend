services:
  backend:
    build: .
    # DATABASE_URL (and other config) come from ./.env. In dev this points at
    # the managed Neon Postgres instance, so no local db service is required.
    #
    # To use a LOCAL Postgres instead, uncomment the `db` service below and set
    # DATABASE_URL in .env to:
    #   postgresql+psycopg2://billnova:billnova@db:5432/billnova
    env_file:
      - ./.env
    ports:
      - "8000:8000"

  # --- Optional local Postgres (disabled; using Neon via .env) ---
