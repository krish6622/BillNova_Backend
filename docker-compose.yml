services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-billnova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-billnova}
      POSTGRES_DB: ${POSTGRES_DB:-billnova}
    volumes:
      - billnova_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-billnova}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-billnova}:${POSTGRES_PASSWORD:-billnova}@db:5432/${POSTGRES_DB:-billnova}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  billnova_db:
